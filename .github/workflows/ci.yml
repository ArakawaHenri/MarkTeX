name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync environment
        run: uv sync --locked --extra dev --python ${{ matrix.python-version }}
      - name: Unit tests
        run: uv run --locked --python ${{ matrix.python-version }} python -m unittest discover -s tests -v
      - name: Compile check
        run: uv run --locked --python ${{ matrix.python-version }} python -m compileall -q src tests
      - name: Ruff
        run: uv run --locked --python ${{ matrix.python-version }} ruff check .
      - name: Mypy
        run: uv run --locked --python ${{ matrix.python-version }} mypy src
      - name: Whitespace check
        run: git diff --check
      - name: Build package
        run: uv build
